<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="460" viewBox="0 0 1120 460" role="img" aria-label="LangGraph 진단 파이프라인">
  <rect width="1120" height="460" rx="18" fill="#f7f9fc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3158a8"/>
    </marker>
  </defs>
  <style>
    .title{font:700 24px 'Malgun Gothic',Arial,sans-serif;fill:#172033}
    .sub{font:400 15px 'Malgun Gothic',Arial,sans-serif;fill:#475467}
    .node{fill:#eef4ff;stroke:#3158a8;stroke-width:2}
    .detail{fill:#fff1e8;stroke:#e86636;stroke-width:2}
    .result{fill:#eaf8f2;stroke:#20a36b;stroke-width:2}
    .decision{fill:#fffaf0;stroke:#c6b58f;stroke-width:2}
    .label{font:700 15px 'Malgun Gothic',Arial,sans-serif;fill:#172033}
    .small{font:400 12px 'Malgun Gothic',Arial,sans-serif;fill:#475467}
    .branch{font:700 12px 'Malgun Gothic',Arial,sans-serif;fill:#3158a8}
    .center{text-anchor:middle}
    .arrow{stroke:#3158a8;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>

  <text class="title" x="40" y="44">LangGraph 진단 파이프라인</text>
  <text class="sub" x="40" y="73">Node 3의 조건 분기에 따라 기본 리포트 또는 공고문 기반 상세 리포트로 이동한다.</text>

  <rect class="node" x="55" y="172" width="150" height="70" rx="14"/>
  <text class="label center" x="130" y="198">Node 1</text>
  <text class="small center" x="130" y="220">프로필 분석</text>

  <path class="arrow" d="M205 207 H260"/>

  <rect class="node" x="260" y="172" width="170" height="70" rx="14"/>
  <text class="label center" x="345" y="198">Node 2</text>
  <text class="small center" x="345" y="220">특공 추천</text>

  <path class="arrow" d="M430 207 H485"/>

  <path class="decision" d="M585 122 L685 207 L585 292 L485 207 Z"/>
  <text class="label center" x="585" y="185">Node 3</text>
  <text class="small center" x="585" y="209">공고문 입력?</text>
  <text class="small center" x="585" y="227">wants_detailed</text>

  <path class="arrow" d="M685 207 H720 V132 H750"/>
  <text class="branch center" x="718" y="194">예</text>

  <rect class="detail" x="750" y="100" width="160" height="62" rx="14"/>
  <text class="label center" x="830" y="127">Node 4</text>
  <text class="small center" x="830" y="148">공고문 구조화</text>
  <text class="branch center" x="830" y="88">예 · 상세 리포트 경로</text>

  <path class="arrow" d="M830 162 V218"/>

  <rect class="detail" x="750" y="218" width="160" height="62" rx="14"/>
  <text class="label center" x="830" y="245">Node 5</text>
  <text class="small center" x="830" y="266">전략·재무 분석</text>

  <path class="arrow" d="M910 249 H950"/>

  <rect class="result" x="950" y="218" width="140" height="62" rx="14"/>
  <text class="label center" x="1020" y="244">Node 6</text>
  <text class="small center" x="1020" y="265">최종 리포트</text>

  <path class="arrow" d="M585 292 V326 H930 V270 H950"/>
  <text class="branch center" x="760" y="318">아니오 · 기본 리포트 경로</text>

  <path class="arrow" d="M1020 280 V350"/>
  <rect class="node" x="948" y="350" width="144" height="42" rx="14"/>
  <text class="label center" x="1020" y="376">최종 응답 반환</text>
</svg>
