<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="900" viewBox="0 0 1220 900" role="img" aria-label="LangGraph 도구 계층 구조">
  <rect width="1220" height="900" rx="18" fill="#f7f9fc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3158a8"/>
    </marker>
    <marker id="agentArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#9b6bdf"/>
    </marker>
  </defs>
  <style>
    .title{font:700 24px 'Malgun Gothic',Arial,sans-serif;fill:#172033}
    .sub{font:400 15px 'Malgun Gothic',Arial,sans-serif;fill:#475467}
    .layer1{fill:#eef4ff;stroke:#3158a8;stroke-width:2;rx:16}
    .layer2{fill:#f5edff;stroke:#9b6bdf;stroke-width:2;rx:16}
    .layer25{fill:#fff1f7;stroke:#e94f9b;stroke-width:2;rx:16}
    .layer3{fill:#eaf8f2;stroke:#20a36b;stroke-width:2;rx:16}
    .data{fill:#fff8e6;stroke:#f5c65d;stroke-width:2;rx:16}
    .box{fill:#fff;stroke:#d8e0ee;stroke-width:2;rx:12}
    .label{font:700 16px 'Malgun Gothic',Arial,sans-serif;fill:#172033}
    .small{font:400 12px 'Malgun Gothic',Arial,sans-serif;fill:#475467}
    .legend{font:700 12px 'Malgun Gothic',Arial,sans-serif;fill:#475467}
    .center{text-anchor:middle;dominant-baseline:middle}
    .direct{stroke:#3158a8;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
    .agent{stroke:#9b6bdf;stroke-width:2.2;stroke-dasharray:7 5;fill:none;marker-end:url(#agentArrow)}
    .join{stroke:#3158a8;stroke-width:2.2;fill:none}
  </style>

  <text class="title" x="40" y="44">Node와 Tool, Calculator 계층 구조</text>
  <text class="sub" x="40" y="73">Node 2는 dispatcher 기반 직접 실행, Node 5는 고정 invoke와 ReAct Agent 호출을 함께 사용한다.</text>

  <path class="direct" d="M790 78 H830"/>
  <text class="legend" x="840" y="82">직접 실행 / 고정 invoke</text>
  <path class="agent" d="M985 78 H1025"/>
  <text class="legend" x="1035" y="82">ReAct Agent 호출</text>

  <rect class="layer1" x="35" y="110" width="1150" height="118"/>
  <rect class="layer2" x="35" y="260" width="1150" height="130"/>
  <rect class="layer25" x="35" y="430" width="1150" height="112"/>
  <rect class="layer3" x="35" y="582" width="1150" height="165"/>

  <g class="arrows">
    <path class="direct" d="M215 202 V308"/>

    <path class="direct" d="M905 202 V240 H505 V308"/>
    <path class="direct" d="M905 202 V240 H685 V308"/>
    <path class="agent" d="M905 202 V308"/>
    <path class="agent" d="M905 202 V240 H1095 V308"/>

    <path class="direct" d="M215 357 V408 H335 V466"/>
    <path class="direct" d="M215 357 V408 H900 V466"/>

    <path class="direct" d="M335 514 V624"/>
    <path class="direct" d="M900 514 V624"/>

    <path class="direct" d="M335 672 V680 H170 V684"/>
    <path class="direct" d="M335 672 V680 H420 V684"/>
    <path class="direct" d="M900 672 V680 H685 V684"/>
    <path class="direct" d="M900 672 V680 H935 V684"/>
    <path class="direct" d="M900 672 V680 H1120 V684"/>

    <path class="join" d="M170 732 V770 H610"/>
    <path class="join" d="M420 732 V770 H610"/>
    <path class="join" d="M685 732 V770 H610"/>
    <path class="join" d="M935 732 V770 H610"/>
    <path class="join" d="M1120 732 V770 H610"/>
    <path class="direct" d="M610 770 V794"/>
  </g>

  <text class="label center" x="610" y="130">계층 1 · 그래프 노드</text>
  <rect class="box" x="130" y="160" width="170" height="42"/>
  <text class="label center" x="215" y="181">Node 2</text>
  <rect class="box" x="820" y="160" width="170" height="42"/>
  <text class="label center" x="905" y="181">Node 5</text>

  <text class="label center" x="610" y="280">계층 2 · LangChain Tool / Dispatcher</text>
  <rect class="box" x="130" y="315" width="170" height="42"/>
  <text class="label center" x="215" y="336">dispatcher.py</text>
  <rect class="box" x="420" y="315" width="170" height="42"/>
  <text class="label center" x="505" y="336">financial.py</text>
  <rect class="box" x="600" y="315" width="170" height="42"/>
  <text class="label center" x="685" y="336">rag_tools.py</text>
  <rect class="box" x="795" y="315" width="210" height="42"/>
  <text class="label center" x="900" y="336">probability_tools.py</text>
  <rect class="box" x="1010" y="315" width="170" height="42"/>
  <text class="label center" x="1095" y="336">strategy_tools.py</text>

  <text class="label center" x="610" y="450">계층 2.5 · 계산 래퍼</text>
  <text class="small center" x="610" y="470">dispatcher가 호출하는 함수 wrapper</text>
  <rect class="box" x="180" y="472" width="310" height="42"/>
  <text class="label center" x="335" y="493">housing_subscription_score_tool.py</text>
  <rect class="box" x="760" y="472" width="280" height="42"/>
  <text class="label center" x="900" y="493">special_supply_tools.py</text>

  <text class="label center" x="610" y="604">계층 3 · calculator 모듈</text>
  <rect class="box" x="210" y="630" width="250" height="42"/>
  <text class="label center" x="335" y="651">housing_subscription_score.py</text>
  <rect class="box" x="795" y="630" width="210" height="42"/>
  <text class="label center" x="900" y="651">special_supply.py</text>
  <rect class="box" x="60" y="690" width="220" height="42"/>
  <text class="small center" x="170" y="711">score_constants.py</text>
  <rect class="box" x="300" y="690" width="240" height="42"/>
  <text class="small center" x="420" y="711">partial_adapter.py</text>
  <rect class="box" x="560" y="690" width="250" height="42"/>
  <text class="small center" x="685" y="711">response_adapter.py</text>
  <rect class="box" x="850" y="690" width="170" height="42"/>
  <text class="small center" x="935" y="711">special_rules.py</text>
  <rect class="box" x="1040" y="690" width="160" height="42"/>
  <text class="small center" x="1120" y="711">income_constants.py</text>

  <rect class="data" x="410" y="800" width="400" height="44"/>
  <text class="label center" x="610" y="822">data/processed/structured/*.json</text>
</svg>
