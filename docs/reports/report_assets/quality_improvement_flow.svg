<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" role="img" aria-label="품질 고도화 흐름">
  <rect width="1120" height="360" rx="18" fill="#f7f9fc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3158a8"/>
    </marker>
  </defs>
  <style>
    .title{font:700 24px 'Malgun Gothic',Arial,sans-serif;fill:#172033}
    .sub{font:400 15px 'Malgun Gothic',Arial,sans-serif;fill:#475467}
    .card{fill:#fff;stroke:#d8e0ee;stroke-width:2;filter:url(#shadow)}
    .label{font:700 18px 'Malgun Gothic',Arial,sans-serif;fill:#172033}
    .small{font:400 13px 'Malgun Gothic',Arial,sans-serif;fill:#475467}
    .chip{font:700 12px 'Malgun Gothic',Arial,sans-serif;fill:#3158a8}
    .arrow{stroke:#3158a8;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#d7dfec" flood-opacity=".7"/>
  </filter>

  <text class="title" x="40" y="46">품질 고도화 흐름</text>
  <text class="sub" x="40" y="76">검색 평가, 모델 적용성 판단, 전략 엔진 개선, UX 정리를 순차적으로 연결했다.</text>

  <rect class="card" x="42" y="125" width="230" height="142" rx="14"/>
  <rect x="70" y="148" width="72" height="28" rx="8" fill="#eef4ff" stroke="#b9cdfc"/>
  <text class="chip" x="88" y="167">Step 1</text>
  <text class="label" x="70" y="204">RAG 품질 평가</text>
  <text class="small" x="70" y="232">Recall@k와 LLM Judge로</text>
  <text class="small" x="70" y="254">검색·응답 품질을 분리 평가</text>

  <path class="arrow" d="M272 196 H326"/>

  <rect class="card" x="326" y="125" width="230" height="142" rx="14"/>
  <rect x="354" y="148" width="72" height="28" rx="8" fill="#eef4ff" stroke="#b9cdfc"/>
  <text class="chip" x="372" y="167">Step 2</text>
  <text class="label" x="354" y="204">QLoRA 적용성 판단</text>
  <text class="small" x="354" y="232">EXAONE·Qwen·GPT 비교로</text>
  <text class="small" x="354" y="254">튜닝의 역할과 한계 정리</text>

  <path class="arrow" d="M556 196 H610"/>

  <rect class="card" x="610" y="125" width="230" height="142" rx="14"/>
  <rect x="638" y="148" width="72" height="28" rx="8" fill="#eef4ff" stroke="#b9cdfc"/>
  <text class="chip" x="656" y="167">Step 3</text>
  <text class="label" x="638" y="204">전략 엔진 개선</text>
  <text class="small" x="638" y="232">점수·자격·자금 리스크를</text>
  <text class="small" x="638" y="254">최종 리포트에 모순 없이 조립</text>

  <path class="arrow" d="M840 196 H894"/>

  <rect class="card" x="894" y="125" width="184" height="142" rx="14"/>
  <rect x="922" y="148" width="72" height="28" rx="8" fill="#eef4ff" stroke="#b9cdfc"/>
  <text class="chip" x="940" y="167">Step 4</text>
  <text class="label" x="922" y="204">UX 정리</text>
  <text class="small" x="922" y="232">결과·출처·다음 행동을</text>
  <text class="small" x="922" y="254">한 화면에서 확인</text>
</svg>
