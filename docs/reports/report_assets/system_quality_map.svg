<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="390" viewBox="0 0 1120 390" role="img" aria-label="시스템 품질 고도화 구조">
  <rect width="1120" height="390" rx="18" fill="#f7f9fc"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#3158a8"/></marker></defs>
  <style>
    .title{font:700 24px 'Malgun Gothic',Arial,sans-serif;fill:#172033}.subtitle{font:400 15px 'Malgun Gothic',Arial,sans-serif;fill:#475467}
    .card{fill:#ffffff;stroke:#d8e0ee;stroke-width:2;rx:16}.accent{fill:#eef4ff;stroke:#3158a8;stroke-width:2;rx:16}
    .label{font:700 17px 'Malgun Gothic',Arial,sans-serif;fill:#172033}.body{font:400 13px 'Malgun Gothic',Arial,sans-serif;fill:#475467}.pill{fill:#eef4ff;stroke:#b8c9f5;stroke-width:1;rx:12}.pillText{font:700 12px 'Malgun Gothic',Arial,sans-serif;fill:#3158a8}.arrow{stroke:#3158a8;stroke-width:3;fill:none;marker-end:url(#arrow)}
  </style>
  <text class="title" x="40" y="46">시스템 품질 고도화 구조</text>
  <text class="subtitle" x="40" y="75">입력부터 최종 화면까지 계산, 검색, 생성, UX를 분리해 품질을 관리했다.</text>

  <rect class="card" x="55" y="122" width="170" height="142"/><text class="label" x="82" y="157">사용자 입력</text><text class="body" x="82" y="188">통장·주택·혼인·소득</text><text class="body" x="82" y="210">공고문 한 줄 입력</text><rect class="pill" x="82" y="226" width="82" height="24"/><text class="pillText" x="101" y="243">Frontend</text>
  <path class="arrow" d="M242 193 H288"/>
  <rect class="accent" x="305" y="122" width="170" height="142"/><text class="label" x="332" y="157">계산·검증</text><text class="body" x="332" y="188">가점·자격·자금</text><text class="body" x="332" y="210">규칙 로직으로 확정</text><rect class="pill" x="332" y="226" width="92" height="24"/><text class="pillText" x="350" y="243">Node2·5</text>
  <path class="arrow" d="M492 193 H538"/>
  <rect class="card" x="555" y="122" width="170" height="142"/><text class="label" x="582" y="157">검색·구조화</text><text class="body" x="582" y="188">RAG 근거 검색</text><text class="body" x="582" y="210">공고문 JSON 추출</text><rect class="pill" x="582" y="226" width="94" height="24"/><text class="pillText" x="600" y="243">RAG·Node4</text>
  <path class="arrow" d="M742 193 H788"/>
  <rect class="accent" x="805" y="122" width="170" height="142"/><text class="label" x="832" y="157">최종 리포트</text><text class="body" x="832" y="188">추천 Top 3</text><text class="body" x="832" y="210">근거·출처·다음 행동</text><rect class="pill" x="832" y="226" width="86" height="24"/><text class="pillText" x="851" y="243">Node6·UX</text>

  <rect class="card" x="95" y="292" width="930" height="62"/>
  <text class="body" x="135" y="318">운영 원칙: 계산은 백엔드 규칙 로직이 담당하고, LLM은 검색 근거를 바탕으로</text>
  <text class="body" x="135" y="338">설명과 구조화를 보조한다.</text>
</svg>
