  <text class="value" x="455" y="194">0.277</text>
  <text class="label" x="401" y="333">ROUGE-2</text>

  <rect x="640" y="147" width="42" height="153" fill="#b7c8f2"/>
  <rect x="692" y="129" width="42" height="171" fill="#3158a8"/>
