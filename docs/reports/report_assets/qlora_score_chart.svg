<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="420" viewBox="0 0 1120 420" role="img" aria-label="QLoRA 튜닝 전후 비교">
  <rect width="1120" height="420" rx="18" fill="#f7f9fc"/>
  <style>
    .title{font:700 24px 'Malgun Gothic',Arial,sans-serif;fill:#172033}
