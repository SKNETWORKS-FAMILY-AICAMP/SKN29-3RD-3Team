  <text class="small" x="54" y="304">0.0</text>
  <text class="small" x="54" y="232">0.2</text>
  <text class="small" x="54" y="160">0.4</text>

  <rect x="168" y="139" width="42" height="161" fill="#b7c8f2"/>
  <rect x="220" y="121" width="42" height="179" fill="#3158a8"/>
  <text class="value" x="166" y="133">0.447</text>
  <text class="value" x="219" y="115">0.497</text>
  <text class="label" x="162" y="333">ROUGE-1</text>

  <rect x="405" y="175" width="42" height="125" fill="#b7c8f2"/>
  <rect x="457" y="200" width="42" height="100" fill="#3158a8"/>
