  <text class="title" x="40" y="44">Qwen2.5-7B QLoRA 튜닝 전후 비교</text>
  <text class="sub" x="40" y="73">88개 데이터 기준 실험 1과 313개 데이터 기준 실험 4를 비교했다.</text>

  <rect x="758" y="40" width="16" height="16" rx="4" fill="#b7c8f2"/>
