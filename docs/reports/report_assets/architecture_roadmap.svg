<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" role="img" aria-label="향후 아키텍처 확장 로드맵">
  <rect width="1120" height="360" rx="18" fill="#f7f9fc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3158a8"/>
    </marker>
  </defs>
  <style>
    .title{font:700 24px 'Malgun Gothic',Arial,sans-serif;fill:#172033}
    .sub{font:400 15px 'Malgun Gothic',Arial,sans-serif;fill:#475467}
    .card{fill:#fff;stroke:#d8e0ee;stroke-width:2;rx:14}
    .accent{fill:#eef4ff;stroke:#3158a8;stroke-width:2;rx:14}
    .label{font:700 15px 'Malgun Gothic',Arial,sans-serif;fill:#172033}
    .small{font:400 12px 'Malgun Gothic',Arial,sans-serif;fill:#475467}
    .center{text-anchor:middle}
    .arrow{stroke:#3158a8;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
  </style>

  <text class="title" x="40" y="44">향후 아키텍처 확장 로드맵</text>
  <text class="sub" x="40" y="73">현재 안정성 중심 구조에서 운영 규모와 데이터 요구에 따라 단계적으로 확장한다.</text>

  <path class="arrow" d="M215 184 H235"/>
  <path class="arrow" d="M385 184 H405"/>
  <path class="arrow" d="M560 184 H580"/>
  <path class="arrow" d="M745 184 H765"/>
  <path class="arrow" d="M930 184 H950"/>

  <rect class="accent" x="35" y="145" width="180" height="78"/>
  <text class="label center" x="125" y="171">현재 구조</text>
  <text class="small center" x="125" y="194">ChromaDB + Offline RAG</text>
  <text class="small center" x="125" y="214">On-Demand Parsing</text>

  <rect class="card" x="245" y="145" width="140" height="78"/>
  <text class="label center" x="315" y="171">1단계</text>
  <text class="small center" x="315" y="194">pgvector 이전</text>
  <text class="small center" x="315" y="214">연결 안정성 강화</text>

  <rect class="card" x="415" y="145" width="145" height="78"/>
  <text class="label center" x="487.5" y="171">2단계</text>
  <text class="small center" x="487.5" y="194">PDF/HWP 업로드</text>
  <text class="small center" x="487.5" y="214">+ OCR 분석</text>

  <rect class="card" x="590" y="145" width="155" height="78"/>
  <text class="label center" x="667.5" y="171">3단계</text>
  <text class="small center" x="667.5" y="194">Daily Batch 수집</text>
  <text class="small center" x="667.5" y="214">공고 리스트 자동화</text>

  <rect class="card" x="775" y="145" width="155" height="78"/>
  <text class="label center" x="852.5" y="171">4단계</text>
  <text class="small center" x="852.5" y="194">관리자 검증</text>
  <text class="small center" x="852.5" y="214">대시보드</text>

  <rect class="accent" x="960" y="145" width="140" height="78"/>
  <text class="label center" x="1030" y="171">5단계</text>
  <text class="small center" x="1030" y="194">경쟁률/당첨가점</text>
  <text class="small center" x="1030" y="214">통계 DB 연동</text>
</svg>
