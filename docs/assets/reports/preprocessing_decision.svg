<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-label="전처리 판단 기준">
  <rect width="1120" height="560" rx="18" fill="#f7f9fc"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#3158a8"/></marker></defs>
  <style>
    .title{font:700 24px 'Malgun Gothic',Arial,sans-serif;fill:#172033}.sub{font:400 15px 'Malgun Gothic',Arial,sans-serif;fill:#475467}
    .card{fill:#fff;stroke:#d8e0ee;stroke-width:2;rx:14}.accent{fill:#eef4ff;stroke:#3158a8;stroke-width:2;rx:14}.warn{fill:#fff8e6;stroke:#f5d58a;stroke-width:2;rx:14}
    .label{font:700 15px 'Malgun Gothic',Arial,sans-serif;fill:#172033}.small{font:400 12px 'Malgun Gothic',Arial,sans-serif;fill:#475467}.arrow{stroke:#3158a8;stroke-width:2.3;fill:none;marker-end:url(#arrow)}
  </style>
  <text class="title" x="40" y="44">전처리 및 정합성 판단 기준</text>
  <text class="sub" x="40" y="73">텍스트 추출 이후 유효성, 구조 보존 방식, metadata 부여 여부를 단계적으로 판단한다.</text>

  <g class="arrows">
    <path class="arrow" d="M215 158 H295"/>
    <path class="arrow" d="M465 158 H530"/>
    <path class="arrow" d="M535 158 H400 V244"/>
    <path class="arrow" d="M745 158 H910 V244"/>
    <path class="arrow" d="M640 208 V244"/>
    <path class="arrow" d="M600 312 C540 352, 460 368, 395 376"/>
    <path class="arrow" d="M680 312 C740 352, 820 368, 885 376"/>
    <path class="arrow" d="M520 414 H557"/>
    <path class="arrow" d="M740 414 H703"/>
    <path class="arrow" d="M630 442 V480"/>
  </g>

  <rect class="accent" x="65" y="130" width="150" height="56"/>
  <text class="label" x="100" y="154">원본 문서</text>
  <text class="small" x="100" y="174">PDF/HWP/MD</text>

  <rect class="accent" x="305" y="130" width="160" height="56"/>
  <text class="label" x="348" y="154">텍스트 추출</text>
  <text class="small" x="340" y="174">본문 후보 확보</text>

  <path class="card" d="M640 108 L745 158 L640 208 L535 158 Z"/>
  <text class="label" x="640" y="164" text-anchor="middle">유효한 텍스트인가?</text>

  <rect class="warn" x="270" y="250" width="260" height="62"/>
  <text class="label" x="330" y="276">빈 페이지 / 디자인 페이지</text>
  <text class="small" x="365" y="298">제외 처리</text>

  <rect class="warn" x="770" y="250" width="280" height="62"/>
  <text class="label" x="835" y="276">이미지·표 중심 페이지</text>
  <text class="small" x="825" y="298">보완 대상 표시 후 수동 구조화 검토</text>

  <rect class="accent" x="520" y="250" width="240" height="62"/>
  <text class="label" x="590" y="276">문서 구조 기준</text>
  <text class="small" x="555" y="298">장·절·조·Q번호 또는 표 중심</text>

  <rect class="card" x="250" y="382" width="270" height="64"/>
  <text class="label" x="335" y="408">구조 기반 청킹</text>
  <text class="small" x="313" y="430">상위 문맥 prefix 유지</text>

  <rect class="card" x="740" y="382" width="300" height="64"/>
  <text class="label" x="810" y="408">표 보존 또는 자연어 변환</text>
  <text class="small" x="818" y="430">숫자 조건 의미 단위 유지</text>

  <rect class="accent" x="565" y="386" width="130" height="56"/>
  <text class="label" x="586" y="419">metadata 부여</text>

  <rect class="card" x="370" y="486" width="380" height="42"/>
  <text class="small" x="430" y="512">정합성 검증 후 collection 저장 단계로 전달</text>
</svg>

