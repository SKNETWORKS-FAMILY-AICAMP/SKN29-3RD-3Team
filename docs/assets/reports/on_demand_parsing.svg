<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" role="img" aria-label="On-Demand Parsing 구조">
  <rect width="1120" height="360" rx="18" fill="#f7f9fc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3158a8"/>
    </marker>
  </defs>
  <style>
    .title{font:700 24px 'Malgun Gothic',Arial,sans-serif;fill:#172033}
    .sub{font:400 15px 'Malgun Gothic',Arial,sans-serif;fill:#475467}
    .card{fill:#fff;stroke:#d8e0ee;stroke-width:2}
    .accent{fill:#eef4ff;stroke:#3158a8;stroke-width:2}
    .agent{fill:#fff1e8;stroke:#e86636;stroke-width:2}
    .result{fill:#eaf8f2;stroke:#20a36b;stroke-width:2}
    .label{font:700 16px 'Malgun Gothic',Arial,sans-serif;fill:#172033}
    .small{font:400 12px 'Malgun Gothic',Arial,sans-serif;fill:#475467}
    .arrow{stroke:#3158a8;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>

  <text class="title" x="40" y="44">On-Demand Parsing 구조</text>
  <text class="sub" x="40" y="73">공고 전체를 상시 수집하지 않고, 사용자가 입력한 관심 공고문만 구조화해 상세 리포트로 연결한다.</text>

  <rect class="accent" x="55" y="150" width="220" height="66" rx="14"/>
  <text class="label" x="106" y="176">사용자 관심 공고문</text>
  <text class="small" x="134" y="198">텍스트 입력</text>

  <path class="arrow" d="M275 183 H340"/>

  <rect class="agent" x="340" y="150" width="210" height="66" rx="14"/>
  <text class="label" x="418" y="176">Node 4</text>
  <text class="small" x="400" y="198">Structured Output</text>

  <path class="arrow" d="M550 183 H615"/>

  <rect class="card" x="615" y="150" width="210" height="66" rx="14"/>
  <text class="label" x="674" y="174">공고 Schema</text>
  <text class="small" x="662" y="198">지역·가격·세대수 추출</text>

  <path class="arrow" d="M825 183 H890"/>

  <rect class="agent" x="890" y="150" width="180" height="66" rx="14"/>
  <text class="label" x="954" y="176">Node 5</text>
  <text class="small" x="942" y="198">금융·전략 분석</text>

  <path class="arrow" d="M980 216 V260"/>

  <rect class="result" x="890" y="260" width="180" height="52" rx="14"/>
  <text class="label" x="943" y="292">상세 리포트</text>
</svg>
