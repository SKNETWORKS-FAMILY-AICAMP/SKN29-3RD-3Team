<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430" role="img" aria-label="Hybrid ReAct 설계">
  <rect width="1120" height="430" rx="18" fill="#f7f9fc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3158a8"/>
    </marker>
  </defs>
  <style>
    .title{font:700 24px 'Malgun Gothic',Arial,sans-serif;fill:#172033}
    .sub{font:400 15px 'Malgun Gothic',Arial,sans-serif;fill:#475467}
    .card{fill:#fff;stroke:#d8e0ee;stroke-width:2}
    .accent{fill:#eef4ff;stroke:#3158a8;stroke-width:2}
    .agent{fill:#fff1e8;stroke:#e86636;stroke-width:2}
    .result{fill:#eaf8f2;stroke:#20a36b;stroke-width:2}
    .label{font:700 16px 'Malgun Gothic',Arial,sans-serif;fill:#172033}
    .small{font:400 12px 'Malgun Gothic',Arial,sans-serif;fill:#475467}
    .arrow{stroke:#3158a8;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>

  <text class="title" x="40" y="44">Hybrid ReAct 설계</text>
  <text class="sub" x="40" y="73">자격·점수·공고 구조화는 결정적으로 처리하고, 전략 해석만 제한적 ReAct Agent에 맡긴다.</text>

  <rect class="accent" x="70" y="168" width="170" height="66" rx="14"/>
  <text class="label" x="116" y="194">Node 1~4</text>
  <text class="small" x="110" y="216">결정적 상태계</text>

  <path class="arrow" d="M240 201 H310"/>

  <rect class="card" x="310" y="112" width="170" height="50" rx="12"/>
  <text class="label" x="362" y="143">자격 판정</text>
  <rect class="card" x="310" y="176" width="170" height="50" rx="12"/>
  <text class="label" x="362" y="207">점수 계산</text>
  <rect class="card" x="310" y="240" width="170" height="50" rx="12"/>
  <text class="label" x="354" y="271">공고문 구조화</text>

  <path class="arrow" d="M480 137 C535 137, 550 185, 610 185"/>
  <path class="arrow" d="M480 201 H610"/>
  <path class="arrow" d="M480 265 C535 265, 550 217, 610 217"/>

  <rect class="agent" x="610" y="166" width="170" height="70" rx="14"/>
  <text class="label" x="666" y="194">Node 5</text>
  <text class="small" x="650" y="216">전략 분석 구간</text>

  <path class="arrow" d="M780 201 H840"/>

  <rect class="card" x="840" y="112" width="190" height="56" rx="14"/>
  <text class="label" x="902" y="137">고정 계산</text>
  <text class="small" x="884" y="157">대출액·실투자금·리스크</text>
  <rect class="agent" x="840" y="184" width="190" height="56" rx="14"/>
  <text class="label" x="886" y="209">제한적 ReAct</text>
  <text class="small" x="882" y="229">전략 비교·RAG 해석</text>

  <path class="arrow" d="M935 168 V184"/>
  <path class="arrow" d="M935 240 V290"/>

  <rect class="result" x="840" y="290" width="190" height="58" rx="14"/>
  <text class="label" x="895" y="316">최종 리포트</text>
  <text class="small" x="892" y="336">계산 + 해석 통합</text>
</svg>
