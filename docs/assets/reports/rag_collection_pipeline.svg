<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430" role="img" aria-label="RAG 데이터 파이프라인과 collection 구성">
  <rect width="1120" height="430" rx="18" fill="#f7f9fc"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#3158a8"/></marker></defs>
  <style>
    .title{font:700 24px 'Malgun Gothic',Arial,sans-serif;fill:#172033}.sub{font:400 15px 'Malgun Gothic',Arial,sans-serif;fill:#475467}
    .card{fill:#fff;stroke:#d8e0ee;stroke-width:2;rx:14}.accent{fill:#eef4ff;stroke:#3158a8;stroke-width:2;rx:14}.store{fill:#fff8e6;stroke:#f5d58a;stroke-width:2;rx:14}
    .label{font:700 15px 'Malgun Gothic',Arial,sans-serif;fill:#172033}.small{font:400 12px 'Malgun Gothic',Arial,sans-serif;fill:#475467}.tag{font:700 12px 'Malgun Gothic',Arial,sans-serif;fill:#3158a8}.arrow{stroke:#3158a8;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <text class="title" x="40" y="44">RAG 데이터 파이프라인과 collection 구성</text>
  <text class="sub" x="40" y="73">원천 데이터는 문서 유형별 전용 청커를 거쳐 6개 ChromaDB collection으로 분리 저장된다.</text>

  <rect class="accent" x="60" y="170" width="150" height="64"/><text class="label" x="96" y="196">원천 데이터</text><text class="small" x="90" y="218">법령·FAQ·가이드</text>
  <path class="arrow" d="M210 202 H285"/>
  <rect class="accent" x="295" y="170" width="190" height="64"/><text class="label" x="334" y="196">문서 유형 판단</text><text class="small" x="328" y="218">형식·출처·metadata 확인</text>
  <path class="arrow" d="M485 202 H560"/>

  <rect class="card" x="560" y="104" width="290" height="196"/>
  <text class="label" x="650" y="131">전용 Chunker</text><text class="small" x="630" y="151">문서별 구조를 보존해 청크 생성</text>
  <rect class="accent" x="585" y="170" width="115" height="42"/><text class="tag" x="604" y="195">law_chunker</text>
  <rect class="accent" x="715" y="170" width="115" height="42"/><text class="tag" x="734" y="195">faq_chunker</text>
  <rect class="accent" x="585" y="226" width="115" height="42"/><text class="tag" x="600" y="251">manual_chunker</text>
  <rect class="accent" x="715" y="226" width="115" height="42"/><text class="tag" x="728" y="251">guide_chunker</text>
  <path class="arrow" d="M850 202 H910"/>

  <rect class="store" x="910" y="94" width="170" height="216"/>
  <text class="label" x="958" y="124">ChromaDB</text><text class="small" x="945" y="146">collection별 분리 저장</text>
  <rect class="card" x="935" y="166" width="120" height="26"/><text class="small" x="956" y="184">law_chunks</text>
  <rect class="card" x="935" y="198" width="120" height="26"/><text class="small" x="956" y="216">faq_chunks</text>
  <rect class="card" x="935" y="230" width="120" height="26"/><text class="small" x="946" y="248">manual_chunks</text>
  <rect class="card" x="935" y="262" width="120" height="26"/><text class="small" x="946" y="280">guide_chunks</text>

  <rect class="card" x="210" y="338" width="700" height="54"/>
  <text class="label" x="360" y="361">검색 단계에서는 질문 유형에 따라 필요한 collection을 우선 조회</text>
  <text class="small" x="430" y="381">검색 품질과 근거 추적성을 높이기 위한 저장 구조</text>
</svg>
