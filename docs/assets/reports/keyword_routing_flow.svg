<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430" role="img" aria-label="키워드 기반 collection 라우팅">
  <rect width="1120" height="430" rx="18" fill="#f7f9fc"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#3158a8"/></marker></defs>
  <style>
    .title{font:700 24px 'Malgun Gothic',Arial,sans-serif;fill:#172033}.sub{font:400 15px 'Malgun Gothic',Arial,sans-serif;fill:#475467}
    .card{fill:#fff;stroke:#d8e0ee;stroke-width:2;rx:14}.accent{fill:#eef4ff;stroke:#3158a8;stroke-width:2;rx:14}.warn{fill:#fff8e6;stroke:#f5d58a;stroke-width:2;rx:14}
    .label{font:700 15px 'Malgun Gothic',Arial,sans-serif;fill:#172033}.small{font:400 12px 'Malgun Gothic',Arial,sans-serif;fill:#475467}.chip{font:700 12px 'Malgun Gothic',Arial,sans-serif;fill:#3158a8}.center{text-anchor:middle}.arrow{stroke:#3158a8;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <text class="title" x="40" y="44">키워드 기반 collection 라우팅</text>
  <text class="sub" x="40" y="73">질문에서 감지한 키워드에 따라 우선 조회할 collection을 선택하고, 결과가 부족하면 전체 검색으로 보완한다.</text>

  <rect class="accent" x="60" y="145" width="150" height="62"/>
  <text class="label center" x="135" y="171">사용자 질문</text>
  <text class="small center" x="135" y="192">자유 텍스트</text>
  <path class="arrow" d="M210 176 H285"/>

  <rect class="accent" x="295" y="145" width="185" height="62"/>
  <text class="label center" x="387.5" y="171">route_collections()</text>
  <text class="small center" x="387.5" y="192">키워드 매칭</text>
  <path class="arrow" d="M480 176 H560"/>

  <rect class="card" x="560" y="92" width="230" height="168"/>
  <text class="label center" x="675" y="121">매칭 유형</text>
  <text class="chip" x="585" y="154">전매/거주의무</text><text class="small" x="682" y="154">lh_guide_chunks</text>
  <text class="chip" x="585" y="184">가점/무주택</text><text class="small" x="682" y="184">guide_chunks</text>
  <text class="chip" x="585" y="214">소득기준</text><text class="small" x="682" y="214">lh_guide + guide</text>
  <text class="chip" x="585" y="244">특별공급</text><text class="small" x="682" y="244">lh_guide + FAQ</text>
  <path class="arrow" d="M790 176 H875"/>

  <rect class="accent" x="875" y="135" width="190" height="82"/>
  <text class="label center" x="970" y="164">search_weighted()</text>
  <text class="small center" x="970" y="186">선택 collection 우선 검색</text>
  <text class="small center" x="970" y="204">거리 보정 및 정렬</text>

  <path class="arrow" d="M970 217 V282"/>
  <rect class="card" x="875" y="282" width="190" height="52"/>
  <text class="label center" x="970" y="304">결과 반환</text>
  <text class="small center" x="970" y="322">근거 chunk 포함 응답</text>

  <path class="arrow" d="M388 207 V266 C388 274, 402 278, 420 282"/>
  <rect class="warn" x="295" y="282" width="250" height="52"/>
  <text class="label center" x="420" y="304">매칭 없음</text>
  <text class="small center" x="420" y="322">전체 collection 동일 검색</text>
  <path class="arrow" d="M545 308 H875"/>
</svg>

