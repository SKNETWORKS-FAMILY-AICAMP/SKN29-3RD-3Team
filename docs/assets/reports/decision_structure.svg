<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="420" viewBox="0 0 1120 420" role="img" aria-label="미적용 기술 의사결정 구조">
  <rect width="1120" height="420" rx="18" fill="#f7f9fc"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#3158a8"/></marker></defs>
  <style>
    .title{font:700 24px 'Malgun Gothic',Arial,sans-serif;fill:#172033}.sub{font:400 15px 'Malgun Gothic',Arial,sans-serif;fill:#475467}
    .card{fill:#fff;stroke:#d8e0ee;stroke-width:2;rx:14}.accent{fill:#eef4ff;stroke:#3158a8;stroke-width:2;rx:14}.warn{fill:#fff8e6;stroke:#f5d58a;stroke-width:2;rx:14}
    .label{font:700 15px 'Malgun Gothic',Arial,sans-serif;fill:#172033}.body{font:400 12px 'Malgun Gothic',Arial,sans-serif;fill:#475467}.arrow{stroke:#3158a8;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
  </style>
  <text class="title" x="40" y="44">미적용 기술 의사결정 구조</text>
  <text class="sub" x="40" y="73">청약 도메인 적합성, 안정성, 비용 효율성을 기준으로 대체 설계를 선택했다.</text>

  <rect class="accent" x="460" y="105" width="200" height="54"/>
  <text class="label" x="514" y="138">검토 기술</text>

  <path class="arrow" d="M560 160 V198"/>
  <path class="arrow" d="M560 188 C360 188, 180 190, 180 230"/>
  <path class="arrow" d="M560 188 C560 198, 560 208, 560 230"/>
  <path class="arrow" d="M560 188 C760 188, 940 190, 940 230"/>

  <rect class="warn" x="55" y="230" width="250" height="58"/>
  <text class="label" x="105" y="255">Graph DB / GraphRAG</text>
  <text class="body" x="104" y="277">관계 탐색 중심 기술</text>

  <rect class="warn" x="435" y="230" width="250" height="58"/>
  <text class="label" x="472" y="255">완전 자율형 Agent Loop</text>
  <text class="body" x="500" y="277">자율 추론 중심 기술</text>

  <rect class="warn" x="815" y="230" width="250" height="58"/>
  <text class="label" x="850" y="255">자동 Data Ingestion</text>
  <text class="body" x="858" y="277">실시간 수집 중심 기술</text>

  <path class="arrow" d="M180 288 V320"/>
  <path class="arrow" d="M560 288 V320"/>
  <path class="arrow" d="M940 288 V320"/>

  <rect class="accent" x="55" y="320" width="250" height="58"/>
  <text class="label" x="82" y="345">Multi-Collection RAG</text>
  <text class="body" x="96" y="367">+ Python 규칙 계산</text>

  <rect class="accent" x="435" y="320" width="250" height="58"/>
  <text class="label" x="477" y="345">LangGraph 상태기계</text>
  <text class="body" x="495" y="367">+ 제한적 ReAct</text>

  <rect class="accent" x="815" y="320" width="250" height="58"/>
  <text class="label" x="852" y="345">Static Golden Dataset</text>
  <text class="body" x="866" y="367">+ On-Demand Parsing</text>

  <rect class="card" x="385" y="175" width="350" height="42"/>
  <text class="label" x="445" y="202">안정성과 설명 가능성 확보</text>
</svg>
