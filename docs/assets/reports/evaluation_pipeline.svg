<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" role="img" aria-label="RAG 평가 파이프라인">
  <rect width="1120" height="360" rx="18" fill="#f7f9fc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3158a8"/>
    </marker>
  </defs>
  <style>
    .title{font:700 24px 'Malgun Gothic',Arial,sans-serif;fill:#172033}
    .sub{font:400 15px 'Malgun Gothic',Arial,sans-serif;fill:#475467}
    .card{fill:#fff;stroke:#d8e0ee;stroke-width:2}
    .accent{fill:#eef4ff;stroke:#3158a8;stroke-width:2}
    .label{font:700 17px 'Malgun Gothic',Arial,sans-serif;fill:#172033}
    .small{font:400 13px 'Malgun Gothic',Arial,sans-serif;fill:#475467}
    .metric{font:700 14px 'Malgun Gothic',Arial,sans-serif;fill:#3158a8}
    .arrow{stroke:#3158a8;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>

  <text class="title" x="40" y="46">RAG 평가 파이프라인</text>
  <text class="sub" x="40" y="76">검색 품질은 Recall@k로, 최종 응답 품질은 LLM Judge로 분리해 확인했다.</text>

  <rect class="card" x="54" y="128" width="215" height="132" rx="14"/>
  <text class="label" x="78" y="160">평가 질문 세트</text>
  <text class="small" x="78" y="190">대표 청약 질문 14개</text>
  <text class="small" x="78" y="214">기대 collection과</text>
  <text class="small" x="78" y="238">필수 키워드 지정</text>

  <path class="arrow" d="M269 194 H330"/>

  <rect class="accent" x="330" y="128" width="235" height="132" rx="14"/>
  <text class="label" x="362" y="160">Retriever 평가</text>
  <text class="metric" x="362" y="190">Recall@k</text>
  <text class="small" x="362" y="216">필요 문서 검색 여부를</text>
  <text class="small" x="362" y="240">응답 생성 전 단계에서 확인</text>

  <path class="arrow" d="M565 194 H626"/>

  <rect class="card" x="626" y="128" width="235" height="132" rx="14"/>
  <text class="label" x="660" y="160">응답 생성</text>
  <text class="small" x="660" y="190">LangGraph FAQ 흐름과</text>
  <text class="small" x="660" y="214">RAG context 기반 답변</text>

  <path class="arrow" d="M861 194 H922"/>

  <rect class="accent" x="922" y="128" width="150" height="132" rx="14"/>
  <text class="label" x="963" y="160">Judge</text>
  <text class="metric" x="958" y="194">9.8 / 9.4</text>
  <text class="small" x="958" y="222">근거성</text>
  <text class="small" x="958" y="246">관련성</text>
</svg>
