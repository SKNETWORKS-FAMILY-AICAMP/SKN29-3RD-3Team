<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" role="img" aria-label="모델 적용성 비교">
  <rect width="1120" height="360" rx="18" fill="#ffffff"/>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#172033" flood-opacity="0.10"/>
    </filter>
  </defs>
  <style>
    .title { font: 700 24px 'Malgun Gothic', Arial, sans-serif; fill: #172033; }
    .subtitle { font: 400 15px 'Malgun Gothic', Arial, sans-serif; fill: #475467; }
    .card { fill: #f7f9fc; stroke: #d8e0ee; stroke-width: 2; rx: 16; filter: url(#shadow); }
    .warn { fill: #fff8e6; stroke: #f5d58a; stroke-width: 2; rx: 16; filter: url(#shadow); }
    .selected { fill: #eef4ff; stroke: #3158a8; stroke-width: 3; rx: 16; filter: url(#shadow); }
    .label { font: 700 17px 'Malgun Gothic', Arial, sans-serif; fill: #3158a8; }
    .body { font: 400 14px 'Malgun Gothic', Arial, sans-serif; fill: #475467; }
    .small { font: 700 13px 'Malgun Gothic', Arial, sans-serif; fill: #667085; }
  </style>

  <text class="title" x="40" y="44">모델 적용성 비교</text>
  <text class="subtitle" x="40" y="73">최종 서비스는 계산 로직과 구조화 출력의 안정성을 기준으로 GPT + RAG + Structured Output 구조를 채택했다.</text>

  <rect class="warn" x="40" y="110" width="320" height="190"/>
  <text class="label" x="68" y="145">LG EXAONE 3.5</text>
  <text class="body" x="68" y="178">한국어 특화 모델로 기대감은 높음</text>
  <text class="body" x="68" y="206">transformers/peft 호환 이슈 발생</text>
  <text class="body" x="68" y="234">학습 파이프라인 안정화 실패</text>
  <text class="small" x="68" y="270">결론: 현 단계 적용 보류</text>

  <rect class="card" x="400" y="110" width="320" height="190"/>
  <text class="label" x="428" y="145">Qwen2.5-7B + QLoRA</text>
  <text class="body" x="428" y="178">표준 생태계에서 학습 가능</text>
  <text class="body" x="428" y="206">313개 데이터 기준 일부 지표 개선</text>
  <text class="body" x="428" y="234">7B 운영 비용 대비 효과 제한</text>
  <text class="small" x="428" y="270">결론: 연구 후보, 운영 적용 보류</text>

  <rect class="selected" x="760" y="110" width="320" height="190"/>
  <text class="label" x="788" y="145">GPT + RAG + Structured Output</text>
  <text class="body" x="788" y="178">공고문 JSON 추출과 검증에 적합</text>
  <text class="body" x="788" y="206">계산은 백엔드 도구로 확정</text>
  <text class="body" x="788" y="234">프롬프트와 schema 제어가 효율적</text>
  <text class="small" x="788" y="270">결론: 최종 서비스 경로 채택</text>
</svg>
