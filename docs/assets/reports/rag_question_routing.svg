<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430" role="img" aria-label="RAG 질문 유형별 검색 흐름">
  <rect width="1120" height="430" rx="18" fill="#f7f9fc"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#3158a8"/></marker></defs>
  <style>
    .title{font:700 24px 'Malgun Gothic',Arial,sans-serif;fill:#172033}.sub{font:400 15px 'Malgun Gothic',Arial,sans-serif;fill:#475467}
    .card{fill:#fff;stroke:#d8e0ee;stroke-width:2;rx:16}.accent{fill:#eef4ff;stroke:#3158a8;stroke-width:2;rx:16}
    .label{font:700 16px 'Malgun Gothic',Arial,sans-serif;fill:#172033}.body{font:400 13px 'Malgun Gothic',Arial,sans-serif;fill:#475467}.pill{fill:#eef4ff;stroke:#b8c9f5;stroke-width:1;rx:12}.pillText{font:700 12px 'Malgun Gothic',Arial,sans-serif;fill:#3158a8}.arrow{stroke:#3158a8;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
  </style>
  <text class="title" x="40" y="44">RAG 질문 유형별 검색 흐름</text>
  <text class="sub" x="40" y="73">사용자 질문의 성격을 먼저 판별한 뒤, 문서 유형에 맞는 collection을 우선 검색한다.</text>

  <rect class="accent" x="50" y="170" width="150" height="80"/>
  <text class="label" x="84" y="204">사용자 질문</text><text class="body" x="78" y="229">자격·법령·소득 등</text>
  <path class="arrow" d="M200 210 H275"/>

  <rect class="card" x="285" y="150" width="165" height="120"/>
  <text class="label" x="326" y="196">질문 성격</text><text class="body" x="318" y="224">키워드와 의도 분류</text>

  <path class="arrow" d="M450 170 C515 116, 560 110, 625 116"/>
  <path class="arrow" d="M450 195 C510 172, 560 168, 625 168"/>
  <path class="arrow" d="M450 224 C510 246, 560 250, 625 250"/>
  <path class="arrow" d="M450 250 C510 312, 570 320, 625 318"/>

  <rect class="pill" x="508" y="98" width="92" height="25"/><text class="pillText" x="529" y="116">자격/조건</text>
  <rect class="pill" x="510" y="156" width="90" height="25"/><text class="pillText" x="532" y="174">법령 근거</text>
  <rect class="pill" x="482" y="240" width="118" height="25"/><text class="pillText" x="496" y="258">소득/자산/전매</text>
  <rect class="pill" x="510" y="304" width="90" height="25"/><text class="pillText" x="533" y="322">일반 안내</text>

  <rect class="card" x="635" y="88" width="210" height="48"/><text class="label" x="682" y="118">FAQ / 매뉴얼</text>
  <rect class="card" x="635" y="146" width="210" height="48"/><text class="label" x="712" y="176">법령</text>
  <rect class="card" x="635" y="230" width="210" height="48"/><text class="label" x="672" y="260">LH 가이드 / 제도안내</text>
  <rect class="card" x="635" y="288" width="210" height="48"/><text class="label" x="703" y="318">웹 FAQ</text>

  <path class="arrow" d="M845 112 C895 112, 900 188, 930 203"/>
  <path class="arrow" d="M845 170 C900 170, 900 196, 930 203"/>
  <path class="arrow" d="M845 254 C900 254, 900 210, 930 203"/>
  <path class="arrow" d="M845 312 C895 312, 900 220, 930 203"/>
  <rect class="accent" x="940" y="168" width="145" height="70"/>
  <text class="label" x="960" y="197">근거 chunk</text><text class="body" x="969" y="222">후보 통합</text>
  <path class="arrow" d="M1012 238 V286"/>
  <rect class="card" x="910" y="294" width="205" height="58"/>
  <text class="label" x="938" y="328">출처 포함 RAG 답변</text>
</svg>


